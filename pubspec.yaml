name: e_commerce_app
description: "Full-featured eCommerce mobile app (Flutter + Clean Architecture + BLoC)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # DI
  get_it: ^7.7.0

  # Networking
  dio: ^5.7.0

  # Functional error handling
  dartz: ^0.10.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^13.2.5

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.2
  lottie: ^3.1.3
  badges: ^3.1.2

  # Codegen annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
